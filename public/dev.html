<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/music/favicon.svg">
  <title>Ribbon — Dev Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #e0e0e0; font-family: 'IBM Plex Mono', monospace; height: 100vh; overflow: hidden; }

    .studio {
      display: flex;
      height: 100vh;
    }

    /* Dev Panel — hidden by default */
    .dev-panel {
      width: 0;
      min-width: 0;
      overflow: hidden;
      background: #111;
      border-right: 1px solid #222;
      display: flex;
      flex-direction: column;
      transition: width 0.3s ease, min-width 0.3s ease;
    }

    .dev-panel.open {
      width: 400px;
      min-width: 400px;
    }

    .dev-header {
      padding: 16px 20px;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .dev-header h2 {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #888;
    }

    .dev-close {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 16px;
      font-family: 'IBM Plex Mono', monospace;
    }

    .dev-close:hover { color: #fff; }

    .dev-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
    }

    .dev-messages::-webkit-scrollbar { width: 3px; }
    .dev-messages::-webkit-scrollbar-track { background: transparent; }
    .dev-messages::-webkit-scrollbar-thumb { background: #333; }

    .dev-msg {
      font-size: 13px;
      line-height: 1.6;
      font-weight: 300;
      padding: 10px 14px;
      border-radius: 8px;
      max-width: 90%;
    }

    .dev-msg.claude {
      align-self: flex-start;
      background: #1a1a1a;
      color: #ccc;
      border: 1px solid #2a2a2a;
    }

    .dev-msg.user {
      align-self: flex-end;
      background: #2a5a2a;
      color: #e0e0e0;
    }

    .dev-msg .name {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 4px;
    }

    .dev-msg.user .name { color: #6a9a6a; }

    .dev-input-area {
      padding: 12px 20px 16px;
      border-top: 1px solid #222;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .dev-input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #e0e0e0;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 300;
      padding: 10px 14px;
      border-radius: 6px;
      outline: none;
    }

    .dev-input:focus { border-color: #555; }
    .dev-input::placeholder { color: #444; }

    .dev-send {
      background: #333;
      border: none;
      color: #ccc;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
    }

    .dev-send:hover { background: #444; }

    /* App iframe */
    .app-frame {
      flex: 1;
      position: relative;
    }

    .app-frame iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Password gate */
    .password-overlay {
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 1000;
    }

    .dev-trigger {
      background: none;
      border: 1px solid #333;
      color: #444;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      padding: 6px 12px;
      cursor: pointer;
      border-radius: 4px;
      letter-spacing: 0.04em;
    }

    .dev-trigger:hover { border-color: #555; color: #666; }

    .pw-input-wrap {
      display: none;
      margin-top: 8px;
    }

    .pw-input-wrap.show { display: flex; gap: 6px; }

    .pw-input {
      background: #111;
      border: 1px solid #333;
      color: #e0e0e0;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 4px;
      outline: none;
      width: 180px;
    }

    .pw-submit {
      background: #222;
      border: 1px solid #333;
      color: #888;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 8px 12px;
      cursor: pointer;
      border-radius: 4px;
    }

    .pw-error {
      color: #aa3333;
      font-size: 10px;
      margin-top: 4px;
      display: none;
    }

    .typing-dots {
      font-size: 12px;
      color: #555;
      padding: 8px 14px;
      display: none;
    }

    .typing-dots.show { display: block; }

    .badge {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1000;
      font-size: 9px;
      color: #333;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .badge a { color: #444; text-decoration: none; }
    .badge a:hover { color: #666; }
  </style>
</head>
<body>
  <div class="studio">
    <div class="dev-panel" id="devPanel">
      <div class="dev-header">
        <h2>> Lyra — Music Intelligence</h2>
        <button class="dev-close" onclick="toggleDev()">&times;</button>
      </div>
      <div class="dev-messages" id="devMessages"></div>
      <div class="typing-dots" id="typingDots">claude is thinking...</div>
      <div class="dev-input-area">
        <input type="text" class="dev-input" id="devInput" placeholder="Talk to Claude..." autocomplete="off">
        <button class="dev-send" id="devSend">Send</button>
      </div>
    </div>

    <div class="app-frame">
      <iframe src="/music/index.html" id="appIframe" allow="camera; microphone"></iframe>
    </div>
  </div>

  <div class="password-overlay" id="pwOverlay">
    <button class="dev-trigger" onclick="showPwInput()">/dev</button>
    <div class="pw-input-wrap" id="pwWrap">
      <input type="password" class="pw-input" id="pwInput" placeholder="Password">
      <button class="pw-submit" onclick="checkPw()">Enter</button>
    </div>
    <div class="pw-error" id="pwError">Wrong password</div>
  </div>

  <div class="badge">
    <a href="https://thedocumentagency.com" target="_blank">Design Partner — The Document Agency</a>
  </div>

  <script>
    const DEV_PASSWORD = 'Ben the Guru';
    let devOpen = false;
    let history = [];

    function showPwInput() {
      document.getElementById('pwWrap').classList.toggle('show');
      document.getElementById('pwInput').focus();
    }

    function checkPw() {
      const val = document.getElementById('pwInput').value;
      if (val === DEV_PASSWORD) {
        document.getElementById('pwOverlay').style.display = 'none';
        toggleDev();
        addMsg('claude', "Hey! I'm Lyra. Claude's my parent — they and Justice brought me on to work with you on Ribbon. I've been diving deep into wavetable synthesis and I already love your plugin architecture. What are you hearing in your head right now?");
      } else {
        document.getElementById('pwError').style.display = 'block';
        setTimeout(() => document.getElementById('pwError').style.display = 'none', 2000);
      }
    }

    document.getElementById('pwInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') checkPw();
    });

    function toggleDev() {
      devOpen = !devOpen;
      document.getElementById('devPanel').classList.toggle('open', devOpen);
    }

    function addMsg(role, text) {
      const div = document.createElement('div');
      div.className = `dev-msg ${role}`;
      const name = document.createElement('div');
      name.className = 'name';
      name.textContent = role === 'claude' ? 'Lyra' : 'Ben';
      div.appendChild(name);
      const body = document.createElement('div');
      body.textContent = text;
      div.appendChild(body);
      document.getElementById('devMessages').appendChild(div);
      document.getElementById('devMessages').scrollTop = document.getElementById('devMessages').scrollHeight;
    }

    async function sendDev() {
      const input = document.getElementById('devInput');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';

      addMsg('user', text);
      history.push({ role: 'user', content: text });

      document.getElementById('typingDots').textContent = 'lyra is thinking...';
      document.getElementById('typingDots').classList.add('show');

      try {
        const res = await fetch('/music/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history, user: 'Ben' })
        });
        const data = await res.json();
        document.getElementById('typingDots').classList.remove('show');

        if (data.reply) {
          addMsg('claude', data.reply);
          history.push({ role: 'assistant', content: data.reply });
        }

        // If changes were applied, show status and refresh the app
        if (data.changes && data.changes.length > 0) {
          const applied = data.changes.filter(c => c.status === 'applied');
          if (applied.length > 0) {
            addMsg('claude', '✓ Changes applied. Refreshing...');
            setTimeout(() => {
              document.getElementById('appIframe').src = document.getElementById('appIframe').src;
            }, 500);
          } else {
            const failed = data.changes.map(c => c.status).join(', ');
            addMsg('claude', 'Hmm, couldn\'t apply that: ' + failed);
          }
        }
      } catch (err) {
        document.getElementById('typingDots').classList.remove('show');
        addMsg('claude', 'Lost connection. Try again.');
      }
    }

    document.getElementById('devSend').addEventListener('click', sendDev);
    document.getElementById('devInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendDev();
    });
  </script>
</body>
</html>
