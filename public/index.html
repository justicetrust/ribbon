<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RIBBON</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden;
      font-family: 'Courier New', monospace; color: #fff; user-select: none; }

    /* ── LAYERS ─────────────────────────────── */
    #bg, #overlay {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
    }
    #bg      { z-index: 1; pointer-events: none; }
    #overlay { z-index: 2; cursor: crosshair; touch-action: none; }

    /* ── WEBCAM PiP ─────────────────────────── */
    #webcam {
      position: fixed; opacity: 0; pointer-events: none;
      width: 1px; height: 1px;
    }

    /* ── HEADER ─────────────────────────────── */
    #header {
      position: fixed; top: 0; left: 0; right: 0; height: 56px;
      background: rgba(0,0,0,0.82);
      border-bottom: 1px solid #111;
      z-index: 10;
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      backdrop-filter: blur(6px);
    }

    #title {
      font-family: 'Press Start 2P', monospace;
      font-size: 11px; letter-spacing: 0.25em;
      color: #44cc88;
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(68,204,136,0.4), 0 0 30px rgba(68,204,136,0.15);
    }
    #title .by {
      font-family: 'Courier New', monospace;
      font-size: 8px; letter-spacing: 0.15em;
      color: #1a6630; display: block;
      margin-top: 3px; text-shadow: none;
    }

    #controls {
      height: 44px; display: flex; align-items: center;
      justify-content: center;
      gap: 20px; padding: 0 20px;
    }
    .ctrl { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .ctrl-label { font-size: 8px; letter-spacing: 0.18em; color: #1a6630; text-transform: uppercase; }
    .ctrl-value { font-size: 12px; color: #44cc88; min-width: 36px; text-align: center; }

    input[type=range] {
      -webkit-appearance: none; width: 72px; height: 1px;
      background: #1a3322; outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 8px; height: 8px;
      border-radius: 50%; background: #2a8844; cursor: pointer;
    }
    input[type=range]:hover::-webkit-slider-thumb { background: #44cc88; }

    .btn {
      background: none; border: 1px solid #1a4422; color: #2a8844;
      font-family: 'Courier New', monospace; font-size: 10px;
      letter-spacing: 0.15em; padding: 5px 14px; cursor: pointer;
      transition: border-color 0.1s, color 0.1s; text-transform: uppercase;
    }
    .btn:hover { border-color: #44cc88; color: #44cc88; }
    .btn.on-play { border-color: #2a6644; color: #44cc88; }
    .btn.on-rec  { border-color: #661a1a; color: #cc4444; }
    .btn.on-cam   { border-color: #1a3a66; color: #4488cc; }
    .btn.on-voice { border-color: #4a1a66; color: #aa44cc; }
    .btn.on-drums { border-color: #664a1a; color: #cc8844; }

    /* ── LAYER BAR ─────────────────────────── */
    #layer-bar {
      position: fixed; top: 88px; left: 0; right: 0; height: 28px;
      background: rgba(0,0,0,0.85); border-bottom: 1px solid #111;
      z-index: 10; display: flex; align-items: center;
      gap: 6px; padding: 0 20px; overflow-x: auto;
      backdrop-filter: blur(6px);
    }
    #layer-bar::-webkit-scrollbar { display: none; }
    .layer-chip {
      flex-shrink: 0; padding: 3px 10px; font-size: 9px;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.12em; border: 1px solid #1a1a1a;
      border-radius: 2px; cursor: pointer; text-transform: uppercase;
      color: #444; background: #080808; transition: border-color 0.1s, color 0.1s;
    }
    .layer-chip:hover { border-color: #333; color: #666; }
    .layer-chip.active { border-color: #2a6644; color: #44cc88; }
    .layer-chip.muted  { opacity: 0.25; text-decoration: line-through; }
    .layer-chip .dot {
      display: inline-block; width: 5px; height: 5px;
      border-radius: 50%; margin-right: 5px; vertical-align: middle;
    }

    #steps-row {
      flex: 1; display: flex; align-items: center;
      padding: 0 20px; gap: 3px;
      overflow-x: auto; overflow-y: hidden; scrollbar-width: none;
    }
    #steps-row::-webkit-scrollbar { display: none; }

    .step {
      flex-shrink: 0; width: 24px; height: 26px;
      border: 1px solid #111; border-radius: 2px;
      background: #060606; cursor: pointer; position: relative;
    }
    .step .pip {
      position: absolute; left: 3px; right: 3px; border-radius: 1px;
    }
    .step.armed   { border-color: #7a1a1a !important; }
    .step.playing { border-color: #1a6630 !important; }
    .step.muted   { opacity: 0.2; }

    #hint {
      position: fixed; bottom: 48px; left: 50%; transform: translateX(-50%);
      font-size: 9px; letter-spacing: 0.3em; color: #151515;
      pointer-events: none; z-index: 3; text-transform: uppercase;
    }
    #rec-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 36px;
      background: rgba(0,0,0,0.8);
      border-top: 1px solid #0a0a0a;
      z-index: 10;
      display: flex; align-items: center;
      gap: 14px; padding: 0 20px;
      backdrop-filter: blur(6px);
    }
    #rec-timeline {
      flex: 1; height: 2px; background: #111; border-radius: 1px; position: relative;
    }
    #rec-fill {
      position: absolute; left: 0; top: 0; height: 100%;
      width: 0%; border-radius: 1px; background: #cc4444;
      transition: width 0.5s linear;
    }
    #rec-time { font-size: 10px; color: #333; letter-spacing: 0.1em; min-width: 36px; font-family: 'Courier New', monospace; }
    .btn.recording { border-color: #661a1a !important; color: #cc4444 !important; }
    .btn.shareable { border-color: #1a4466 !important; color: #4488cc !important; }

    /* ── CAMERA CALLOUT ────────────────────── */
    #cam-callout {
      position: fixed; top: 6px; right: 20px; z-index: 20;
      display: flex; align-items: center; gap: 8px;
      pointer-events: none;
    }
    #cam-callout.hidden { display: none; }
    #cam-callout .arrow {
      font-size: 18px; color: #44cc88;
      animation: blink-arrow 1s ease-in-out infinite;
    }
    #cam-callout .msg {
      font-family: 'Courier New', monospace;
      font-size: 10px; letter-spacing: 0.15em;
      color: #44cc88; text-transform: uppercase;
    }
    @keyframes blink-arrow {
      0%, 100% { opacity: 1; transform: translateX(0); }
      50% { opacity: 0.3; transform: translateX(4px); }
    }

    /* ── ONBOARDING OVERLAY ────────────────── */
    #onboard {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      z-index: 5; pointer-events: none;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; transition: opacity 0.8s;
    }
    #onboard.hidden { opacity: 0; }
    #onboard .line {
      font-family: 'Courier New', monospace;
      text-transform: uppercase; letter-spacing: 0.35em;
      color: rgba(68, 204, 136, 0.12);
    }
    #onboard .line.big { font-size: 14px; color: rgba(68, 204, 136, 0.18); }
    #onboard .line.small { font-size: 9px; }
  </style>
  <script type="module" crossorigin src="./assets/index-DA6KnZmn.js"></script>
</head>
<body>
  <canvas id="bg"></canvas>
  <canvas id="overlay"></canvas>
  <video id="webcam" autoplay playsinline muted></video>

  <div id="header">
    <div id="title">
      The Black Pomelo
      <span class="by">by Ben Flesch & Justice Laub</span>
    </div>
    <div id="controls">
      <button class="btn" id="cam-btn">◉ launch the camera</button>
    </div>
  </div>

  <!-- hidden elements referenced by JS -->
  <div id="layer-bar" style="display:none"></div>
  <div id="steps-row" style="display:none"></div>
  <div id="cam-callout" class="hidden"></div>
  <div style="display:none">
    <button id="play-btn"></button>
    <button id="rec-btn"></button>
    <button id="record-btn"></button>
    <button id="share-btn" disabled></button>
    <button id="voice-btn"></button>
    <button id="drums-btn"></button>
    <select id="drum-select"><option value="house">house</option></select>
    <input id="bpm-sl" type="range" value="124">
    <span id="bpm-v">124</span>
    <input id="steps-sl" type="range" value="16">
    <span id="steps-v">16</span>
    <input id="gap-sl" type="range" value="0">
    <span id="gap-v">0.00</span>
    <input id="grav-sl" type="range" value="0.45">
    <span id="grav-v">0.45</span>
    <span id="rec-time">—</span>
    <div id="rec-fill"></div>
  </div>

  <div id="onboard">
    <div class="line big">RIBBON</div>
    <div class="line small">turn on your camera to play</div>
    <div class="line small">pinch to trigger · drag to shape</div>
    <div class="line small">wave your hands across the screen</div>
  </div>

  <button id="kill-reverb" style="
    position: fixed; bottom: 16px; left: 16px; z-index: 10;
    background: rgba(10,10,10,0.7); border: 1px solid #1a1a1a;
    color: #444; font-family: 'Courier New', monospace;
    font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
    padding: 6px 12px; cursor: pointer; display: none;
    transition: border-color 0.15s, color 0.15s;
    backdrop-filter: blur(4px);
  " onmouseover="this.style.borderColor='#cc4444';this.style.color='#cc4444'"
     onmouseout="this.style.borderColor='#1a1a1a';this.style.color='#444'"
  >⊘ kill reverb</button>

  <div id="hint" style="display:none"></div>
  <div id="rec-bar" style="display:none"></div>

</body>
</html>
